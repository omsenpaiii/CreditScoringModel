Global:
  use_gpu: False
  epoch_num: 2
  log_smooth_window: 10
  print_batch_step: 10
  save_model_dir: artifacts/ocr/real_ocr_finetune/model
  save_epoch_step: 1
  eval_batch_step: [0, 100]
  cal_metric_during_train: True
  pretrained_model: .cache/pretrain_models/en_PP-OCRv3_rec_train/best_accuracy
  character_dict_path: ppocr/utils/en_dict.txt
  max_text_length: 80
  infer_mode: False
  use_space_char: True
  distributed: False
Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    learning_rate: 0.00005
  regularizer:
    name: L2
    factor: 0.0
Architecture:
  model_type: rec
  algorithm: CRNN
  Backbone:
    name: MobileNetV1Enhance
    scale: 0.5
    last_conv_stride: [1, 2]
    last_pool_type: avg
  Neck:
    name: SequenceEncoder
    encoder_type: rnn
    hidden_size: 48
  Head:
    name: CTCHead
    fc_decay: 0.00004
Loss:
  name: CTCLoss
PostProcess:
  name: CTCLabelDecode
Metric:
  name: RecMetric
  main_indicator: acc
Train:
  dataset:
    name: SimpleDataSet
    data_dir: artifacts/ocr/real_ocr_finetune/real_ocr_dataset
    label_file_list:
      - artifacts/ocr/real_ocr_finetune/real_ocr_dataset/train_labels.txt
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: False
      - RecConAug: {}
      - RecAug: {}
      - MultiLabelEncode: {}
      - RecResizeImg:
          image_shape: [3, 48, 320]
      - KeepKeys:
          keep_keys: ['image', 'label_ctc', 'length', 'label']
  loader:
    shuffle: True
    batch_size_per_card: 4
    drop_last: False
    num_workers: 0
Eval:
  dataset:
    name: SimpleDataSet
    data_dir: artifacts/ocr/real_ocr_finetune/real_ocr_dataset
    label_file_list:
      - artifacts/ocr/real_ocr_finetune/real_ocr_dataset/val_labels.txt
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: False
      - MultiLabelEncode: {}
      - RecResizeImg:
          image_shape: [3, 48, 320]
      - KeepKeys:
          keep_keys: ['image', 'label_ctc', 'length', 'label']
  loader:
    shuffle: False
    drop_last: False
    batch_size_per_card: 4
    num_workers: 0
